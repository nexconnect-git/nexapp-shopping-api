version: "3.8"

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile.prod
    image: frontend-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - back_media:/app/media
      - back_static:/app/staticfiles
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 backend.asgi:application
    volumes:
      - back_media:/app/media
      - back_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: always
    deploy:
      replicas: 3          # 3 Django/Daphne containers for load balancing
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py rqworker default
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py rqscheduler
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-nc_shopping_app}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  pgdata_prod:
  back_media:
  back_static:
