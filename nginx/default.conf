upstream backend {
    least_conn;            # route each request to the least busy container
    server backend:8000;   # Docker resolves this to ALL replicas automatically
    keepalive 32;          # reuse connections to backend containers
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Customer App (Default)
    location /sa/ {
        try_files $uri $uri/ /sa/index.html;
    }

    # Admin Panel
    location /sa/admin/ {
        try_files $uri $uri/ /sa/admin/index.html;
    }

    # Vendor App
    location /sa/vendor/ {
        try_files $uri $uri/ /sa/vendor/index.html;
    }

    # Delivery App
    location /sa/delivery/ {
        try_files $uri $uri/ /sa/delivery/index.html;
    }

    # Django Media
    location /sa/media/ {
        alias /app/media/;
    }

    # Django Static
    location /sa/django_static/ {
        alias /app/staticfiles/;
    }

    # Django API — load balanced across backend replicas
    location /sa/api/ {
        rewrite ^/sa/api/(.*) /api/$1 break;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";           # enable keepalive to backend
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # WebSocket Support (Daphne/Channels)
    location /sa/ws/ {
        rewrite ^/sa/ws/(.*) /ws/$1 break;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (for AWS ALB)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
